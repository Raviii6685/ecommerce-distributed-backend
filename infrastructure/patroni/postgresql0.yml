scope: postgres-cluster
namespace: /db/
name: postgresql0
etcd:
  host: 10.128.0.2:2379
bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        wal_level: replica
        hot_standby: "on"
        max_wal_senders: 10
        max_replication_slots: 10
        wal_log_hints: "on"
  initdb:
    - encoding: UTF8
    - data-checksums
postgresql:
  callbacks:
    on_role_change: /etc/patroni/callbacks/on_role_change.sh
  listen: 0.0.0.0:5432
  connect_address: 10.128.0.2:5432
  data_dir: /var/lib/postgresql/14/main
  bin_dir: /usr/lib/postgresql/14/bin
  pg_hba:
    - host all all 127.0.0.1/32 md5
    - host all all 10.128.0.0/20 md5
    - host replication replicator 127.0.0.1/32 md5
    - host replication replicator 10.128.0.0/20 md5
  authentication:
    replication:
      username: replicator
      password: replicator123
    superuser:
      username: postgres
      password: postgres123
tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
  nosync: false
restapi:
  listen: 0.0.0.0:8008
  connect_address: 10.128.0.2:8008
