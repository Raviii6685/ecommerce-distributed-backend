spring:
  application:
    name: product-management

  # Exclude Redis auto-config when not available
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  # H2 In-Memory (default dev profile)
  datasource:
    url: jdbc:h2:mem:products_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

# JWT
app:
  jwt:
    secret: bXlTdXBlclNlY3JldEtleUZvckp3dEF1dGhlbnRpY2F0aW9uMjAyNg==
    expiration-ms: 86400000  # 24 hours

server:
  port: 8080

---
# Production profile (use with: --spring.profiles.active=prod)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    primary:
      jdbc-url: jdbc:postgresql://10.128.0.4:5432/ecommerce_db
      username: postgres
      password: postgres123
      driver-class-name: org.postgresql.Driver
    replica:
      jdbc-url: jdbc:postgresql://10.128.0.2:5432/ecommerce_db
      username: postgres
      password: postgres123
      driver-class-name: org.postgresql.Driver
    replica2:
      jdbc-url: jdbc:postgresql://10.128.0.3:5432/ecommerce_db
      username: postgres
      password: postgres123
      driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: false